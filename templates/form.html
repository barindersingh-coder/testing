<!DOCTYPE html>
<html>
<head>
<title>Job Generator</title>

<style>

body{
    font-family:Arial, sans-serif;
    background:#f4f6f9;
}

.container{
    width:800px;
    margin:40px auto;
    background:white;
    padding:30px;
    border-radius:10px;
    box-shadow:0px 0px 10px rgba(0,0,0,0.1);
}

h1{
    text-align:center;
    color:#2563eb;
}

input,
textarea{
    width:100%;
    padding:12px;
    margin-top:10px;
    margin-bottom:15px;
    border:1px solid #ccc;
    border-radius:5px;
}

button{
    background:#2563eb;
    color:white;
    border:none;
    padding:12px 20px;
    border-radius:5px;
    cursor:pointer;
    font-size:16px;
}

button:hover{
    background:#1d4ed8;
}

</style>

</head>

<body>

<div class="container">

<h1>Create Job Posting</h1>

<form method="POST">

<input
type="text"
name="company"
placeholder="Company Name"
required>

<input
type="text"
name="title"
placeholder="Job Title"
required>

<textarea
name="description"
rows="8"
placeholder="Job Description"
required></textarea>

<textarea
name="skills"
rows="4"
placeholder="Skills (comma separated)"
required></textarea>

<button type="submit">
Generate Job Page
</button>

</form>

</div>

</body>
</html>
